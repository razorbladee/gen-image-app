services:
  frontend:
    build: ./frontend
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend